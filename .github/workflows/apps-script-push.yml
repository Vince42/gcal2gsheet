name: Push Apps Script

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install clasp
        run: npm install --global @google/clasp

      - name: Write clasp auth config
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "Missing required secret: CLASPRC_JSON"
            exit 1
          fi
          python - <<'PY'
          import os
          import json
          import base64
          import pathlib

          raw = os.environ["CLASPRC_JSON"].strip()

          def parse_json(candidate):
            return json.loads(candidate)

          payload = None
          try:
            parse_json(raw)
            payload = raw
          except Exception:
            try:
              decoded = base64.b64decode(raw).decode("utf-8")
              parse_json(decoded)
              payload = decoded
            except Exception as exc:
              raise SystemExit(f"CLASPRC_JSON is neither valid JSON nor base64-encoded JSON: {exc}")

          home = pathlib.Path.home()
          home.mkdir(parents=True, exist_ok=True)
          target = home / ".clasprc.json"
          target.write_text(payload, encoding="utf-8")
          PY
          chmod 600 "$HOME/.clasprc.json"

      - name: Write clasp project config
        run: |
          cat > .clasp.json <<EOF
          {
            "scriptId": "1XlO8Fb7sktGCrmdqbwtpgLarTw6HpoXUAA7Vv6oakA5OcMDmqHSTm0lC",
            "rootDir": "."
          }
          EOF
          chmod 600 .clasp.json

      - name: Push to Apps Script
        run: |
          clasp --version
          clasp list > /dev/null
          clasp push --force
