<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 16px;
        color: #202124;
      }

      .section {
        border: 1px solid #dadce0;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .section h3 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      .row {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }

      .row label {
        font-weight: 600;
      }

      .hint {
        font-size: 12px;
        color: #5f6368;
        margin-top: 4px;
      }

      input[type='text'],
      input[type='date'],
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        font-family: inherit;
      }

      textarea {
        min-height: 320px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        border: 1px solid #dadce0;
        border-radius: 4px;
        background: #fff;
        padding: 8px 12px;
        cursor: pointer;
      }

      button.primary {
        background: #1a73e8;
        color: #fff;
        border-color: #1a73e8;
      }

      .status {
        min-height: 20px;
        margin-top: 8px;
        font-size: 12px;
      }

      .ok {
        color: #137333;
      }

      .error {
        color: #c5221f;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <div class="row">
        <label for="importStartDate">Import start date</label>
        <div>
          <input id="importStartDate" type="text" placeholder="yyyy-mm-dd" />
          <div class="hint">ISO format: yyyy-mm-dd</div>
        </div>
      </div>
      <div class="row">
        <label for="calendarNames">Calendars</label>
        <div>
          <input id="calendarNames" type="text" />
          <div class="hint">Comma-separated list of calendar names.</div>
        </div>
      </div>
      <div class="hint">
        The <code>defaultCalendarName</code> setting is still available in Advanced JSON and is used for
        duplicate-precedence rules.
      </div>
    </div>

    <div class="section">
      <h3>Advanced (all configuration values)</h3>
      <textarea id="configJson"></textarea>
      <div class="hint">
        Edit any value here. Unknown keys are ignored; known keys are validated when you save.
      </div>
    </div>

    <div class="actions">
      <button type="button" onclick="resetDefaults()">Reset to defaults</button>
      <button type="button" onclick="google.script.host.close()">Cancel</button>
      <button type="button" class="primary" onclick="save()">Save</button>
    </div>

    <div id="status" class="status"></div>

    <script>
      const model = JSON.parse('<?= modelJson ?>');
      let currentConfig = {};

      function setStatus(message, isError) {
        const node = document.getElementById('status');
        node.textContent = message || '';
        node.className = `status ${isError ? 'error' : 'ok'}`;
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value || {}));
      }

      function configFromEditor() {
        const parsed = JSON.parse(document.getElementById('configJson').value);
        currentConfig = clone(parsed);
        return parsed;
      }

      function syncQuickFieldsFromConfig(config) {
        document.getElementById('importStartDate').value = config.importStartDate || '';
        document.getElementById('calendarNames').value = (config.calendarNames || []).join(', ');
      }

      function syncEditorFromCurrentConfig() {
        document.getElementById('configJson').value = JSON.stringify(currentConfig, null, 2);
      }

      function syncCurrentConfigFromQuickFields() {
        currentConfig.importStartDate = document.getElementById('importStartDate').value.trim();
        currentConfig.calendarNames = document.getElementById('calendarNames').value
          .split(',')
          .map((v) => v.trim())
          .filter((v) => v);
        syncEditorFromCurrentConfig();
      }

      function initialize() {
        const config = model && model.config ? model.config : model && model.defaults ? model.defaults : {};
        currentConfig = clone(config);
        syncEditorFromCurrentConfig();
        syncQuickFieldsFromConfig(currentConfig);

        if (model && model.validation && model.validation.message) {
          setStatus(
            model.validation.isValid
              ? `Configuration status: ${model.validation.message}`
              : `Configuration status: ${model.validation.message}`,
            !model.validation.isValid
          );
        }

        ['importStartDate', 'calendarNames'].forEach((id) => {
          document.getElementById(id).addEventListener('input', () => {
            syncCurrentConfigFromQuickFields();
            setStatus('');
          });
        });

        document.getElementById('configJson').addEventListener('input', () => {
          try {
            const parsed = JSON.parse(document.getElementById('configJson').value);
            currentConfig = clone(parsed);
            syncQuickFieldsFromConfig(currentConfig);
            setStatus('');
          } catch (err) {
            setStatus(`Invalid JSON in advanced editor: ${err.message}`, true);
          }
        });
      }

      function save() {
        try {
          syncCurrentConfigFromQuickFields();
          const payload = { config: configFromEditor() };
          setStatus('Saving...', false);
          google.script.run
            .withSuccessHandler(() => {
              setStatus('Saved. Reloading menu configuration...', false);
              google.script.host.close();
            })
            .withFailureHandler((err) => {
              setStatus(err && err.message ? err.message : String(err), true);
            })
            .saveConfigDialog(payload);
        } catch (err) {
          setStatus(err.message || String(err), true);
        }
      }

      function resetDefaults() {
        setStatus('Resetting to defaults...', false);
        google.script.run
          .withSuccessHandler(() => {
            const defaults = model && model.defaults ? model.defaults : {};
            currentConfig = clone(defaults);
            syncEditorFromCurrentConfig();
            syncQuickFieldsFromConfig(currentConfig);
            setStatus('Defaults restored and applied.', false);
          })
          .withFailureHandler((err) => {
            setStatus(err && err.message ? err.message : String(err), true);
          })
          .resetConfigDialog();
      }

      initialize();
    </script>
  </body>
</html>
